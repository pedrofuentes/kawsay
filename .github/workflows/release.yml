name: Release

# Build the installers on native runners, then publish them as ONE GitHub Release
# (AC-5 · ADR-0007/0023/0026). Restructured to fix #122: previously the macOS and
# Windows matrix legs each published independently with electron-builder's `always`
# policy and RACED to create the GitHub Release for the tag, producing two split/
# duplicate releases (each carrying only its own platform's assets — I consolidated
# v0.1.0 by hand).
#
# Now the OS matrix only BUILDS (`electron-builder --publish never`) and uploads
# each platform's installers + update metadata as workflow artifacts; a single
# `publish` job (needs: build) downloads them all and creates exactly ONE release
# with every asset via softprops/action-gh-release. No matrix leg ever creates a
# release, so the race cannot recur. The native catalog engine (better-sqlite3) is
# rebuilt from source for the Electron ABI during packaging — node-gyp needs
# Python (see below).
#
# v1 ships UNSIGNED (ADR-0025): macOS code-signing/notarization is a deferred,
# human-gated step, so signing auto-discovery is turned OFF and electron-builder
# produces unsigned artifacts instead of failing while trying to sign.
#
# The single `publish` job runs in the protected `release` GitHub Environment, so
# the production publish blocks on a required reviewer (@pedrofuentes) — the
# HUMAN-REQUIRED gate from MISSION §9 / PRD AC-5. The matrix build legs hold only
# the default least-privilege token; ONLY the publish job widens to
# `contents: write` (create the release + upload assets) and nothing more.

on:
  # Publish on a pushed release tag, e.g. `v0.1.0`.
  push:
    tags:
      - 'v*'
  # Manual fallback (the tag is derived from package.json version — see Resolve tag).
  workflow_dispatch:

# Never cancel an in-progress release, and serialize runs that target the same
# ref so a tag push and a manual dispatch can't publish the same release at once.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

# Least privilege at the top level; only the publish job widens to contents: write.
permissions:
  contents: read

jobs:
  build:
    name: Build installers (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    strategy:
      # Build every OS even if one fails, so all platform errors surface in one run.
      # The publish job needs ALL legs to succeed (default `needs` semantics), so a
      # failed leg blocks the single release instead of shipping a partial one.
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
    # Pin whisper.cpp here so the workflow YAML is the single source of truth;
    # build-whisper-cli.sh reads these and asserts the cloned HEAD == COMMIT.
    env:
      WHISPER_CPP_REPO: ggml-org/whisper.cpp
      WHISPER_CPP_REF: v1.9.1
      WHISPER_CPP_COMMIT: f049fff95a089aa9969deb009cdd4892b3e74916
      FFMPEG_REPO: FFmpeg/FFmpeg
      FFMPEG_REF: n7.1
      FFMPEG_COMMIT: b08d7969c550a804a59511c7b83f2dd8cc0499b8
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup pnpm
        # Version is read from the `packageManager` field in package.json.
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - name: Setup Node.js 22
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Python 3.11
        # electron-builder rebuilds better-sqlite3 from source for the Electron ABI
        # at package time (npmRebuild + buildDependenciesFromSource); node-gyp needs
        # distutils, removed in Python 3.12, so pin 3.11 (ADR-0007, ARCHITECTURE §8).
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build macOS ffmpeg + ffprobe from source
        # Legal guard (#181): macOS ffmpeg prebuilts are nonfree, so build LGPL-only
        # ffmpeg + ffprobe from pinned source into resources/media/<os>-<arch>/ before
        # staging/packaging. Windows keeps the clean installer prebuilts.
        if: runner.os == 'macOS'
        shell: bash
        run: ./scripts/build-ffmpeg.sh

      - name: Stage media binaries
        # macOS verifies the freshly built source binaries already in resources/media;
        # Windows copies the clean @ffmpeg-installer / @ffprobe-installer prebuilts
        # into resources/media/<os>-<arch>/ BEFORE packaging.
        run: pnpm stage:media

      - name: Verify media binaries
        # Build guard (#175): fail the build if any staged ffmpeg/ffprobe is missing
        # or the wrong arch, so the bug that shipped v0.2.0 (no ffmpeg; a Mach-O
        # x86_64 ffprobe mislabelled as arm64) can never silently ship again. Mirrors
        # the whisper-cli "Verify staged binaries" guard below.
        run: node scripts/verify-media-binaries.mjs

      - name: Build app bundles
        # electron-vite build → out/** (main + preload + renderer) for packaging.
        run: pnpm build

      - name: Cache compiled whisper-cli
        id: whisper-cache
        uses: actions/cache@2c8a9bd7457de244a408f35966fab2fb45fda9c8 # v6.0.0
        with:
          path: resources/whisper
          key: whisper-cli-v1-${{ runner.os }}-${{ env.WHISPER_CPP_REF }}-${{ env.WHISPER_CPP_COMMIT }}-${{ hashFiles('scripts/build-whisper-cli.sh') }}

      - name: Build whisper-cli from source
        # Compile the per-arch whisper-cli (ADR-0027 · #129) into
        # resources/whisper/<os>-<arch>/ BEFORE packaging, so electron-builder's
        # extraResources bundles it. cmake + git are preinstalled on the runners.
        if: steps.whisper-cache.outputs.cache-hit != 'true'
        shell: bash
        run: ./scripts/build-whisper-cli.sh

      - name: Verify staged binaries
        # Assert the expected per-arch binaries exist even on a cache hit, so a
        # corrupt/partial cache fails here instead of silently shipping nothing.
        shell: bash
        run: |
          set -euo pipefail
          if [ "$RUNNER_OS" = "macOS" ]; then
            expected=("resources/whisper/mac-arm64/whisper-cli" "resources/whisper/mac-x64/whisper-cli")
          else
            expected=("resources/whisper/win-x64/whisper-cli.exe")
          fi
          for f in "${expected[@]}"; do
            [ -s "$f" ] || { echo "missing/empty: $f" >&2; exit 1; }
            echo "ok: $f ($(wc -c <"$f") bytes)"
          done

      - name: Package installers (no publish)
        # electron-builder reads electron-builder.yml: it builds the per-OS targets
        # and rebuilds the native module for Electron's ABI. `--publish never` means
        # NO leg creates or uploads a GitHub Release (this is the #122 fix); it still
        # writes the installers AND the channel *.yml / blockmap auto-update metadata
        # into dist/ (that metadata is generated whenever a publish provider is
        # configured, independent of the publish policy) for the publish job to ship.
        run: pnpm exec electron-builder --publish never
        env:
          # UNSIGNED v1 (ADR-0025): do NOT auto-discover a macOS signing identity.
          # Without this, electron-builder would try to sign and fail the build;
          # v1 deliberately ships unsigned — signing/notarization is deferred.
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'

      - name: Upload installers
        # Hand this leg's installers + update metadata to the single publish job.
        # Only the distributables — NOT the multi-hundred-MB unpacked app dirs.
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: kawsay-dist-${{ matrix.os }}
          path: |
            dist/*.dmg
            dist/*.zip
            dist/*.exe
            dist/*.blockmap
            dist/*.yml
          # Fail the leg if it produced nothing to publish (defence in depth).
          if-no-files-found: error
          retention-days: 7

  publish:
    name: Publish consolidated GitHub Release
    needs: [build]
    # The publisher only collects artifacts + creates the release (no native build),
    # so it runs on the cheapest hosted runner; the whisper-cli build script is NOT
    # invoked here (it is macOS/Windows-only and already ran on the build legs).
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Required-reviewer gate for the production publish (ADR-0007, AC-5): the single
    # release is created ONLY after @pedrofuentes approves this job. This is the one
    # HUMAN-REQUIRED gate, and it guards the one job that actually publishes.
    environment: release
    # Create the GitHub Release + upload the installers as assets — nothing more.
    permissions:
      contents: write
    steps:
      - name: Checkout
        # Needed only to read package.json for the workflow_dispatch tag fallback.
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Resolve release tag
        id: tag
        # On a tag push the ref IS the tag; on a manual dispatch derive it from the
        # package.json version (mirrors the prior electron-builder behaviour). Read
        # the ref via env, never interpolated into the script, to avoid injection.
        shell: bash
        env:
          REF_TYPE: ${{ github.ref_type }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          if [ "$REF_TYPE" = "tag" ]; then
            tag="$REF_NAME"
          else
            tag="v$(node -p "require('./package.json').version")"
          fi
          printf 'tag=%s\n' "$tag" >> "$GITHUB_OUTPUT"
          printf 'Resolved release tag: %s\n' "$tag"

      - name: Download all platform installers
        # Collect every build leg's artifacts into one flat directory.
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: release-assets
          pattern: kawsay-dist-*
          merge-multiple: true

      - name: Verify collected release assets
        # Provably complete: assert BOTH platforms' installers AND the cross-platform
        # auto-update metadata are present before publishing, so a missing leg fails
        # here instead of shipping the partial release that #122 produced.
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          cd release-assets
          echo "Collected release assets:"
          ls -la
          dmgs=(*.dmg)
          zips=(*.zip)
          exes=(*.exe)
          tag="${{ steps.tag.outputs.tag }}"
          channel="latest"
          if [[ "$tag" == *-* ]]; then
            channel="${tag#*-}"
            channel="${channel%%.*}"
          fi
          case "$channel" in
            latest|alpha|beta|rc) ;;
            *) echo "unsupported update metadata channel: $channel" >&2; exit 1 ;;
          esac
          mac_metadata="${channel}-mac.yml"
          win_metadata="${channel}.yml"
          [ "${#dmgs[@]}" -ge 1 ] || { echo "missing macOS .dmg" >&2; exit 1; }
          [ "${#zips[@]}" -ge 1 ] || { echo "missing macOS .zip" >&2; exit 1; }
          [ "${#exes[@]}" -ge 1 ] || { echo "missing Windows .exe" >&2; exit 1; }
          [ -f "$mac_metadata" ] || { echo "missing $mac_metadata" >&2; exit 1; }
          [ -f "$win_metadata" ] || { echo "missing $win_metadata (Windows update metadata)" >&2; exit 1; }
          echo "ok: macOS + Windows installers and $channel auto-update metadata all present"

      - name: Publish single consolidated GitHub Release
        # ONE release for the tag carrying every platform's assets (dmg/zip/exe,
        # blockmaps, latest*.yml). No matrix leg creates a release, so the #122
        # publish race cannot recur. fail_on_unmatched_files guards against an empty
        # upload. The token is the repo-scoped Actions token (contents: write).
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          fail_on_unmatched_files: true
          files: release-assets/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
