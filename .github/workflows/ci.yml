name: CI

on:
  pull_request:
  push:
    branches: [main]

# Cancel superseded runs for the same ref; always let `main` runs finish so
# every commit on the protected branch keeps a complete required-check record.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: read

jobs:
  verify:
    name: Verify (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
    env:
      FFMPEG_REPO: FFmpeg/FFmpeg
      FFMPEG_REF: n7.1
      FFMPEG_COMMIT: b08d7969c550a804a59511c7b83f2dd8cc0499b8
      NASM_MIN_VERSION: 2.16.01
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup pnpm
        # Version is read from the `packageManager` field in package.json.
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - name: Setup Node.js 22
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build macOS ffmpeg + ffprobe from source
        # Legal guard (#181): macOS ffmpeg prebuilts are nonfree, so build LGPL-only
        # ffmpeg + ffprobe from pinned source before staging. Windows keeps the clean
        # @ffmpeg-installer / @ffprobe-installer prebuilts.
        if: runner.os == 'macOS'
        shell: bash
        run: ./scripts/build-ffmpeg.sh

      - name: Stage media binaries
        # macOS verifies the freshly built source binaries already in resources/media;
        # Windows copies the clean @ffmpeg-installer / @ffprobe-installer prebuilts.
        run: pnpm stage:media

      - name: Verify media binaries
        # Build guard (#175): fail the run if any staged ffmpeg/ffprobe is missing or
        # the wrong arch, so the bug that shipped v0.2.0 (no ffmpeg; a wrong-arch
        # ffprobe) can never silently ship again. Mirrors the whisper-cli check.
        run: node scripts/verify-media-binaries.mjs

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

  # Compile whisper.cpp's `whisper-cli` from source on each shipped platform
  # (ADR-0027 · #129): macOS arm64 + x64 and Windows x64. This is the same
  # build release.yml runs before packaging, exercised on every PR/push as an
  # independent compile gate. The `verify` job does NOT need the real binary
  # (its tests assert the packaging contract + resolver, not a spawned binary),
  # so this job stands alone — cmake + git are preinstalled on the runners.
  whisper-cli:
    name: Build whisper-cli (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
    # Pin whisper.cpp here so the workflow YAML is the single source of truth;
    # build-whisper-cli.sh reads these and asserts the cloned HEAD == COMMIT.
    env:
      WHISPER_CPP_REPO: ggml-org/whisper.cpp
      WHISPER_CPP_REF: v1.9.1
      WHISPER_CPP_COMMIT: f049fff95a089aa9969deb009cdd4892b3e74916
      FFMPEG_REPO: FFmpeg/FFmpeg
      FFMPEG_REF: n7.1
      FFMPEG_COMMIT: b08d7969c550a804a59511c7b83f2dd8cc0499b8
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Cache compiled whisper-cli
        id: whisper-cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: resources/whisper
          key: whisper-cli-v1-${{ runner.os }}-${{ env.WHISPER_CPP_REF }}-${{ env.WHISPER_CPP_COMMIT }}-${{ hashFiles('scripts/build-whisper-cli.sh') }}

      - name: Build whisper-cli from source
        if: steps.whisper-cache.outputs.cache-hit != 'true'
        shell: bash
        run: ./scripts/build-whisper-cli.sh

      - name: Verify staged binaries
        # Assert the expected per-arch binaries exist even on a cache hit, so a
        # corrupt/partial cache fails here instead of silently shipping nothing.
        shell: bash
        run: |
          set -euo pipefail
          if [ "$RUNNER_OS" = "macOS" ]; then
            expected=("resources/whisper/mac-arm64/whisper-cli" "resources/whisper/mac-x64/whisper-cli")
          else
            expected=("resources/whisper/win-x64/whisper-cli.exe")
          fi
          for f in "${expected[@]}"; do
            [ -s "$f" ] || { echo "missing/empty: $f" >&2; exit 1; }
            echo "ok: $f ($(wc -c <"$f") bytes)"
          done

  # Compile llama.cpp's `llama-embedding` from source on each shipped platform
  # (ADR-0029 · M4-1b): macOS arm64 + x64 and Windows x64 — the on-device engine
  # for M4 smart search. This is the exact sibling of the whisper-cli job above
  # (same build/cache/verify shape) and the same build release.yml runs before
  # packaging, exercised on every PR/push as an independent compile gate. The
  # `verify` job does NOT need the real binary (its tests assert the packaging
  # contract + resolver, not a spawned binary), so this job stands alone — cmake +
  # git are preinstalled on the runners; Node runs the arch-checking verify guard.
  embed-cli:
    name: Build llama-embedding (${{ matrix.os }} ${{ matrix.arch }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
        arch: [arm64, x64]
        # Windows ships x64 only — drop the non-existent win arm64 leg. The result
        # is exactly the 3 shipped (os, arch) targets, each its OWN parallel job, so
        # the two macOS arches no longer compile back-to-back on one runner (which
        # overran the 60-min timeout twice). Each leg keeps its own full budget.
        exclude:
          - os: windows-latest
            arch: arm64
    # Pin llama.cpp here so the workflow YAML is the single source of truth;
    # build-embed-cli.sh reads these and asserts the cloned HEAD == COMMIT.
    # EMBED_ARCH scopes build-embed-cli.sh + verify-embed-binary.mjs to this leg's
    # single arch (unset elsewhere → build/verify every arch for the OS).
    env:
      LLAMA_CPP_REPO: ggml-org/llama.cpp
      LLAMA_CPP_REF: b9848
      LLAMA_CPP_COMMIT: 931eb37f8cac5a6ca84d5641445d460af2a9d7dd
      EMBED_ARCH: ${{ matrix.arch }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Node.js 22
        # Needed only to run the arch-checking verify guard (scripts/verify-embed-
        # binary.mjs) under bare node; the build itself uses cmake + git.
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22

      - name: Cache compiled llama-embedding
        id: embed-cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: resources/embed
          key: embed-cli-v1-${{ runner.os }}-${{ matrix.arch }}-${{ env.LLAMA_CPP_REF }}-${{ env.LLAMA_CPP_COMMIT }}-${{ hashFiles('scripts/build-embed-cli.sh') }}

      - name: Build llama-embedding from source
        if: steps.embed-cache.outputs.cache-hit != 'true'
        shell: bash
        run: ./scripts/build-embed-cli.sh

      - name: Verify staged embed binary
        # Build guard: fail the run if the staged llama-embedding is missing, the
        # wrong arch, or not executable — even on a cache hit — so a corrupt/partial
        # cache fails here instead of silently shipping nothing. Mirrors the whisper
        # "Verify staged binaries" step + the media-binary guard.
        run: node scripts/verify-embed-binary.mjs
