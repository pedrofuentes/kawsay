version: 2
updates:
  # JavaScript / Node dependencies (pnpm) at the repo root.
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      timezone: "Europe/Madrid"
    open-pull-requests-limit: 10
    commit-message:
      prefix: "chore"
      include: "scope"
    groups:
      # Batch all minor + patch bumps into a single PR; majors stay separate.
      npm-minor-and-patch:
        update-types:
          - "minor"
          - "patch"

  # GitHub Actions used in .github/workflows/** — keeps the SHA pins current.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      timezone: "Europe/Madrid"
    open-pull-requests-limit: 10
    commit-message:
      prefix: "ci"
      include: "scope"
    groups:
      actions-minor-and-patch:
        update-types:
          - "minor"
          - "patch"
