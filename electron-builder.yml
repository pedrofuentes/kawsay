# electron-builder configuration — card P1 (AC-5, ADR-0007, ARCHITECTURE §8).
#
# Produces the installable v1 artifacts and launches:
#   - macOS  dmg + zip   (arm64 + x64)
#   - Windows NSIS .exe   (x64 only in v1; win-arm64 deferred — no hosted arm64
#                          Windows runner can smoke-launch it for AC-5, ADR-0007)
# v1 ships UNSIGNED (mac identity null; NSIS unsigned); code-signing/notarization
# is a deferred, human-gated step. Native modules are rebuilt for Electron's ABI
# and unpacked from the asar; the security fuses (ARCHITECTURE §2.5) are flipped at
# package time. Built locally / in CI with `pnpm dist` (never publishes); the first
# production publish of each release is HUMAN-REQUIRED (protected GitHub Environment).
appId: es.pedrofuent.kawsay
productName: Kawsay
copyright: Copyright © 2026 Pedro Fuentes

directories:
  output: dist
  buildResources: resources

# Rebuild better-sqlite3 (and any native dep) against the bundled Electron's ABI at
# package time, compiling from source so the `.node` matches the shipped runtime.
npmRebuild: true
buildDependenciesFromSource: true

files:
  - out/**
  - package.json

# A compiled `.node` can't be dlopen'd from inside the asar, so the native catalog
# engine (better-sqlite3, card F3) is unpacked to app.asar.unpacked to load at
# runtime in the packaged app (ADR-0007, ARCHITECTURE §8). The ffmpeg/ffprobe
# binaries are NOT in node_modules — they ship as extraResources under
# Resources/media/<os>-<arch>/ (see below, #175), the same out-of-asar pattern as
# whisper-cli, so each installer carries ONLY its own-arch binary.
asar: true
asarUnpack:
  - '**/node_modules/better-sqlite3/**'

# The whisper.cpp `whisper-cli` engine (MIT) for on-device transcription (card
# #129, ADR-0027). It is built FROM SOURCE per-arch in CI (scripts/build-whisper-
# cli.sh) into resources/whisper/<os>-<arch>/, then bundled here as an
# extraResource so the packaged app spawns it from `process.resourcesPath` — the
# same out-of-asar pattern as the better-sqlite3 engine above and the ffmpeg /
# ffprobe media binaries below (it is a native executable, not a `.node`, so it
# lives in Resources, not the asar; resolved by
# electron/main/transcription/whisper-cli.ts). electron-builder
# expands ${os}-${arch} per build leg (mac-arm64, mac-x64, win-x64), so each
# installer carries ONLY its own-arch binary. NO model ships here — the `small`
# ggml model is a separate opt-in, checksum-verified download (ADR-0027 Decision
# 6; cards #130/#131). A missing source dir is a build-time WARNING, not an error
# (electron-builder app-builder-lib copyFiles), so a local `pnpm dist` that skips
# the build script still produces an app — just without the transcription engine.
extraResources:
  - from: 'resources/whisper/${os}-${arch}/'
    to: 'whisper/${os}-${arch}/'
    filter:
      - '**/*'
  # The llama.cpp `llama-embedding` engine (MIT) for on-device M4 smart search
  # (ADR-0029 Decision 1, milestone M4-1b). Built FROM SOURCE per-arch in CI
  # (scripts/build-embed-cli.sh) into resources/embed/<os>-<arch>/, then bundled
  # here as an extraResource — the same out-of-asar pattern as whisper-cli above,
  # resolved at runtime by electron/main/search/embed-cli.ts (EMBED_RESOURCE_SUBDIR
  # = 'embed'). electron-builder expands ${os}-${arch} per build leg (mac-arm64,
  # mac-x64, win-x64), so each installer carries ONLY its own-arch binary. NO
  # embedding weights ship here — those are a separate, later opt-in slice; this
  # bundles ONLY the executable. A missing source dir is a build-time WARNING (not
  # an error), so a local `pnpm dist` that skips the build script still produces an
  # app — search just degrades to exact FTS (embed-cli.ts returns UNAVAILABLE).
  - from: 'resources/embed/${os}-${arch}/'
    to: 'embed/${os}-${arch}/'
    filter:
      - '**/*'
  # ffmpeg + ffprobe for audio extraction (transcription) and video posters /
  # media probing (ingestion) — #175/#181. macOS binaries are built from pinned
  # LGPL FFmpeg source by scripts/build-ffmpeg.sh; Windows is copied from clean
  # @ffmpeg-installer / @ffprobe-installer packages by scripts/stage-media-binaries.mjs
  # into resources/media/<os>-<arch>/ (run via `pnpm stage:media` in predist / CI
  # before packaging), then bundled here so
  # each installer carries ONLY its own-arch binary, resolved at runtime by
  # electron/main/importers/deps/media-binaries.ts. v0.2.0 shipped NO ffmpeg and a
  # wrong-arch ffprobe; the CI build guard (scripts/verify-media-binaries.mjs)
  # now fails the build if a staged binary is missing, wrong-arch, or nonfree.
  - from: 'resources/media/${os}-${arch}/'
    to: 'media/${os}-${arch}/'
    filter:
      - '**/*'

# Security fuses flipped at package time (ARCHITECTURE §2.5/§8, ADR-0007). Mirrors
# electron/fuses/fuses.ts FUSE_CONFIG — kept in lock-step by tests/unit/packaging-
# config.test.ts — with ONE deliberate v1 exception (the asar-integrity fuse below).
# electron-builder flips these via its bundled @electron/fuses right before signing.
# resetAdHocDarwinSignature re-applies the ad-hoc macOS signature after the flip so the
# UNSIGNED v1 build still launches on Apple Silicon (arm64).
electronFuses:
  runAsNode: false
  enableNodeOptionsEnvironmentVariable: false
  enableNodeCliInspectArguments: false
  onlyLoadAppFromAsar: true
  # FUSE_CONFIG declares this true (the signed-production target), but macOS asar
  # integrity validation REQUIRES code signing: on the UNSIGNED v1 build it makes the
  # renderer fail to load from the asar (ERR_FILE_NOT_FOUND). v1 ships it OFF; the
  # cofounder re-enables it with Developer ID signing/notarization (ADR-0025, AC-5).
  enableEmbeddedAsarIntegrityValidation: false
  grantFileProtocolExtraPrivileges: false
  enableCookieEncryption: true
  resetAdHocDarwinSignature: true

mac:
  category: public.app-category.lifestyle
  identity: null # unsigned v1 — Gatekeeper one-time prompt; signing deferred (ADR-0007)
  target:
    - target: dmg
      arch:
        - arm64
        - x64
    - target: zip
      arch:
        - arm64
        - x64

win:
  target:
    - target: nsis
      arch:
        - x64

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true

# Build-time release destination for the HUMAN-REQUIRED publish gate only. The
# automated/local `pnpm dist` build passes `--publish never`, so a CI or developer
# build can never upload a release; publishing happens solely via the gated release
# workflow (protected GitHub Environment, @pedrofuentes approval — ADR-0007, AC-5).
# Kawsay bundles no electron-updater/autoUpdater, so this adds no runtime network
# feed and the zero-egress guarantee (AC-4) is untouched.
publish:
  provider: github
  owner: pedrofuentes
  repo: kawsay
  releaseType: release
